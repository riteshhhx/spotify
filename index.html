<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Analytics - Project 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- MATHJAX CONFIGURATION & SCRIPT -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* CORE RESET & LAYOUT */
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            color: #FFFFFF;
            height: 100vh;
            overflow: hidden;
            display: block; 
            position: relative;
        }

        /* --- LAYOUT GRID --- */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr; /* Sidebar | Main */
            height: 100vh;
            overflow: hidden;
            padding-bottom: 90px; /* Default space for footer */
            transition: padding-bottom 0.5s ease; 
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background-color: #000000;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 280px;
            border-right: 1px solid #282828;
            height: 100%; 
            overflow: hidden; 
        }

        /* Heroic Flash Animation */
        @keyframes heroic-flash {
            0% { text-shadow: 0 0 0 rgba(29, 185, 84, 0); transform: scale(1); }
            50% { text-shadow: 0 0 20px rgba(29, 185, 84, 0.8), 0 0 40px rgba(29, 185, 84, 0.4); color: #ffffff; transform: scale(1.02); }
            100% { text-shadow: 0 0 0 rgba(29, 185, 84, 0); transform: scale(1); }
        }

        /* Float Animation */
        @keyframes float-logo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 800;
            color: #FFFFFF;
            margin-bottom: 10px;
            cursor: pointer;
            flex-shrink: 0;
            letter-spacing: -0.5px;
            animation: heroic-flash 3s infinite ease-in-out;
        }
        
        .nav-links { 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            flex-shrink: 0; 
        }
        
        .nav-item {
            display: flex; align-items: center; gap: 16px;
            color: #B3B3B3; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: color 0.2s;
        }
        .nav-item:hover, .nav-item.active { color: #FFFFFF; }

        /* Search Input Styles */
        #search-wrapper {
            transition: all 0.3s ease;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            margin-bottom: 0;
        }
        #search-wrapper.visible {
            max-height: 50px;
            opacity: 1;
            margin-bottom: 10px;
        }

        .library-section {
            border-top: 1px solid #282828;
            padding-top: 16px;
            padding-bottom: 20px;
            flex-grow: 1; 
            height: 0;     
            min-height: 0; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            overflow-y: auto; 
        }

        .library-section::-webkit-scrollbar { width: 8px; }
        .library-section::-webkit-scrollbar-track { background: transparent; }
        .library-section::-webkit-scrollbar-thumb { background: #5a5a5a; border-radius: 4px; }
        .library-section::-webkit-scrollbar-thumb:hover { background: #888; }

        .lib-header {
            display: flex; justify-content: space-between;
            color: #B3B3B3; font-weight: 700; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.1em;
            margin-bottom: 8px;
            flex-shrink: 0; 
        }

        .playlist-item {
            font-size: 14px; color: #B3B3B3; padding: 8px 0;
            cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: flex; justify-content: space-between;
            flex-shrink: 0;
        }
        .playlist-item:hover { color: #fff; }
        .playlist-item.active { color: #1DB954; }
        .playing-icon { display: none; font-size: 10px; }
        .playlist-item.active .playing-icon { display: block; }

        /* --- MAIN VIEW --- */
        .main-view {
            background: linear-gradient(180deg, #2a2a2a 0%, #121212 100%);
            margin: 8px 8px 0 0;
            border-radius: 8px;
            position: relative;
            overflow-y: auto;
            display: flex; flex-direction: column;
            padding-bottom: 32px;
            cursor: pointer; /* Click to change slide */
        }

        .top-bar {
            height: 64px; width: 100%; position: sticky; top: 0; z-index: 20;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            flex-shrink: 0;
            cursor: default;
        }
        .nav-arrows { display: flex; gap: 16px; }
        .arrow-circle {
            width: 32px; height: 32px; background-color: rgba(0,0,0,0.7);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; cursor: pointer;
        }
        .user-pill {
            background-color: rgba(0,0,0,0.7); padding: 2px 12px 2px 2px;
            border-radius: 23px; display: flex; align-items: center; gap: 8px;
            font-weight: 700; font-size: 12px;
        }

        /* --- SLIDES CONTENT --- */
        .slide { display: none; padding: 24px 32px 100px 32px; animation: fadeIn 0.5s ease; position: relative; }
        .slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Hero Headers */
        .hero-layout { 
            display: flex; 
            align-items: center; 
            gap: 40px; 
            padding: 40px 0 24px 0; 
            position: relative; 
            z-index: 10; 
        }
        .hero-img {
            width: 220px; height: 220px; 
            background: transparent;
            box-shadow: none;
            object-fit: cover; 
            display: grid; place-items: center; 
            border-radius: 12px;
        }
        .hero-text .kicker { font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .hero-text h1 { font-size: 48px; font-weight: 900; margin: 0; line-height: 1.1; letter-spacing: -2px; }
        .hero-text .meta { margin-top: 16px; font-size: 14px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 6px; }

        /* Custom Hero Play Button Animation */
        .hero-play-btn {
            width: 56px; height: 56px; background: #1DB954; border-radius: 50%;
            display: grid; place-items: center; color: #000; font-size: 24px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .hero-play-btn:hover { transform: scale(1.05); box-shadow: 0 6px 14px rgba(0,0,0,0.4); }
        .hero-play-btn:active { transform: scale(0.90) translateY(2px) !important; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* --- CONTENT CARD LAYOUT --- */
        .two-col { 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            margin-top: 24px; 
            position: relative; 
            z-index: 10; 
        }
        
        @media (min-width: 1024px) {
            .two-col { 
                flex-direction: row; 
            }
            .two-col > * { 
                flex: 1; 
                min-width: 0;
            }
        }

        .card { background-color: rgba(255,255,255,0.05); padding: 24px; border-radius: 8px; transition: background 0.3s; }
        .card:hover { background-color: rgba(255,255,255,0.1); }
        
        .code-block {
            font-family: 'Courier New', monospace; background: #1e1e1e; padding: 16px;
            border-radius: 8px; font-size: 13px; color: #d4d4d4; border-left: 4px solid #1DB954;
            overflow-x: auto;
            white-space: pre; 
        }
        .keyword { color: #569cd6; } .string { color: #ce9178; } .comment { color: #6a9955; }

        /* --- FLIP CARD STYLES --- */
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
            height: 200px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            border-radius: 8px;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .flip-card-front {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .flip-card-front:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .flip-card-back {
            background: linear-gradient(145deg, #1DB954, #1ed760);
            color: #000;
            transform: rotateY(180deg);
            border: 1px solid #1DB954;
        }

        /* --- HEATMAP STYLES --- */
        .fire-graph-container {
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .fire-graph-months {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            width: 100%;
            margin-left: 20px;
            margin-bottom: 5px;
            font-size: 10px;
            color: #8b949e;
        }
        .fire-graph-body {
            display: flex;
            gap: 5px;
        }
        .fire-graph-days {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 10px;
            color: #8b949e;
            padding-top: 15px;
            height: 100px; /* Approximate grid height */
        }
        .fire-grid {
            display: grid;
            grid-template-rows: repeat(7, 1fr);
            grid-auto-flow: column; /* Fill columns first (Mon-Sun) */
            gap: 2px;
        }
        .heatmap-cell {
            width: 10px;
            height: 10px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        /* Magma-like gradient */
        .magma-l1 { background-color: #5c1e14; }
        .magma-l2 { background-color: #9c2b1b; }
        .magma-l3 { background-color: #d64018; }
        .magma-l4 { background-color: #ff5722; box-shadow: 0 0 4px #ff5722; }


        /* --- FOOTER PLAYER --- */
        .footer {
            background-color: #181818; border-top: 1px solid #282828;
            padding: 0 16px; 
            display: grid; grid-template-columns: 1fr 2fr 1fr;
            align-items: center; 
            z-index: 50;
            
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.presentation-mode .footer {
            transform: translateY(100%); 
        }
        body.presentation-mode .app-container {
            padding-bottom: 0; 
        }

        .now-playing { display: flex; align-items: center; gap: 14px; }
        .album-thumb-sm { width: 56px; height: 56px; background-color: #282828; border-radius: 4px; overflow: hidden; position: relative; }
        .album-thumb-sm img { width: 100%; height: 100%; object-fit: cover; }
        .track-info { display: flex; flex-direction: column; justify-content: center; }
        .track-name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 2px; cursor: pointer; }
        .track-name:hover { text-decoration: underline; }
        .artist-name { font-size: 11px; color: #b3b3b3; cursor: pointer; }
        .artist-name:hover { text-decoration: underline; color: #fff; }

        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-buttons { display: flex; align-items: center; gap: 20px; color: #b3b3b3; font-size: 16px; }
        .control-buttons i { cursor: pointer; transition: color 0.2s; }
        .control-buttons i:hover { color: #fff; }
        
        .play-pause {
            width: 32px; height: 32px; background-color: #fff; border-radius: 50%;
            color: #000; display: grid; place-items: center; font-size: 14px; cursor: pointer;
            transition: all 0.1s ease;
        }
        .play-pause:hover { transform: scale(1.05); }
        .play-pause.playing { transform: scale(0.90) translateY(1px); background-color: #e0e0e0; }

        .progress-bar-area { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 600px; font-size: 11px; color: #b3b3b3; font-family: monospace; }
        .progress-bar-bg {
            flex-grow: 1; height: 4px; background-color: #4d4d4d; border-radius: 2px;
            position: relative; cursor: pointer;
        }
        .progress-fill { height: 100%; background-color: #fff; border-radius: 2px; width: 0%; transition: width 0.3s linear; }
        .progress-bar-bg:hover .progress-fill { background-color: #1DB954; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #5a5a5a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #888; }
        
        .pill { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; }
        
        /* Scatter Plot Styles */
        .scatter-point {
            transition: all 0.4s ease-out;
            transform-origin: center;
        }
        .scatter-point:hover {
            r: 6;
            fill: #fff;
            filter: drop-shadow(0 0 5px #1DB954);
        }
    </style>
</head>

    <!-- DATA & LOGIC -->
    <script>
        function toggleFlip(element) {
            event.stopPropagation();
            element.classList.toggle('flipped');
        }

        // --- ANIMATED COUNTER LOGIC ---
        function animateCounters() {
            const counters = document.querySelectorAll('.count-up');
            counters.forEach(counter => {
                const target = +counter.getAttribute('data-target');
                const duration = 2000;
                const increment = target / (duration / 16);
                
                let current = 0;
                const updateCount = () => {
                    current += increment;
                    if (current < target) {
                        counter.innerText = Math.ceil(current);
                        requestAnimationFrame(updateCount);
                    } else {
                        counter.innerText = target;
                    }
                };
                updateCount();
            });
        }
        
        // --- ANIMATED BAR CHART LOGIC ---
        function animateChart() {
            setTimeout(() => {
                const bars = document.querySelectorAll('.bar-animate');
                bars.forEach(bar => {
                    const targetHeight = bar.getAttribute('data-height');
                    bar.style.height = targetHeight;
                });
            }, 100);
        }

        // --- GENERATE SCATTER PLOT SVG ---
        function generateScatterPlot() {
            const width = 450;
            const height = 300; // Visual height
            const maxVal = 550; // Axis max value
            const scaleX = width / maxVal;
            const scaleY = height / maxVal;

            let circles = '';
            const points = [];

            // 1. Main Cluster (0-250 X) - Dense
            for (let i = 0; i < 60; i++) {
                const valX = Math.random() * 250;
                let valY = valX + (Math.random() * 60 - 30);
                if (valY > 280) valY = 270 - Math.random() * 20; // Cap at 280
                if (valY < 0) valY = 0;
                points.push({x: valX, y: valY});
            }

            // 2. "2-4 dots from 250-350 on x axis" -> Exactly 3
            for (let i = 0; i < 3; i++) {
                const valX = 250 + Math.random() * 100; // 250-350
                const valY = 200 + Math.random() * 70; // 200-270 (below 280)
                points.push({x: valX, y: valY});
            }

            // 3. "1 dot 400-500"
            points.push({x: 450, y: 240});

            // 4. "1 is 500 plus"
            points.push({x: 530, y: 260});

            // Generate SVG Circles
            points.forEach((p, i) => {
                const cx = p.x * scaleX;
                const cy = height - (p.y * scaleY); // Invert Y for SVG
                const opacity = 0.6 + Math.random() * 0.4;
                circles += `<circle cx="${cx}" cy="${cy}" r="0" class="scatter-point" fill="#1DB954" opacity="${opacity}">
                                <animate attributeName="r" from="0" to="5" dur="0.6s" begin="${i * 0.01}s" fill="freeze" />
                            </circle>`;
            });

            // Axis Ticks
            let axisTicks = '';
            const ticks = [0, 100, 200, 300, 400, 500];
            ticks.forEach(t => {
                // Y-Axis labels
                const yPos = height - (t * scaleY);
                if (t > 0) { // Skip 0 to avoid clutter
                     axisTicks += `<text x="-10" y="${yPos + 4}" fill="#888" font-size="10" text-anchor="end" font-family="monospace">${t}</text>`;
                     axisTicks += `<line x1="0" y1="${yPos}" x2="5" y2="${yPos}" stroke="#888" stroke-width="1"/>`;
                }

                // X-Axis labels
                const xPos = t * scaleX;
                if (t > 0) {
                    axisTicks += `<text x="${xPos}" y="${height + 15}" fill="#888" font-size="10" text-anchor="middle" font-family="monospace">${t}</text>`;
                    axisTicks += `<line x1="${xPos}" y1="${height}" x2="${xPos}" y2="${height-5}" stroke="#888" stroke-width="1"/>`;
                }
            });

            // Ideal line (y=x)
            const x2 = maxVal * scaleX;
            const y2 = height - (maxVal * scaleY);
            const line = `<line x1="0" y1="${height}" x2="${x2}" y2="${y2}" stroke="#fff" stroke-width="1" stroke-dasharray="4,4" opacity="0.3" />`;

            return `
                <svg viewBox="-40 -20 ${width + 80} ${height + 60}" width="100%" height="100%" style="overflow: visible;">
                    <!-- Axes Lines -->
                    <line x1="0" y1="${height}" x2="${width}" y2="${height}" stroke="#888" stroke-width="1" />
                    <line x1="0" y1="${height}" x2="0" y2="0" stroke="#888" stroke-width="1" />
                    
                    <!-- Axis Labels -->

        // APP LOGIC
        let currentSlideIndex = 0;
        let isPlaying = false;
        
        function renderSidebar() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = `<div class="lib-header"><span>Project 2025</span><i class="fas fa-plus"></i></div>`;
            slides.forEach((slide, index) => {
                const div = document.createElement('div');
                div.className = `playlist-item ${index === currentSlideIndex ? 'active' : ''}`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    goToSlide(index);
                };
                div.innerHTML = `
                    <span>${index + 1}. ${slide.title}</span>
                    <i class="fas fa-chart-bar playing-icon"></i>
                `;
                container.appendChild(div);
            });
        }

        function toggleSearch() {
            const wrapper = document.getElementById('search-wrapper');
            const searchInput = document.getElementById('search-input');
            const homeNav = document.getElementById('nav-home');
            const searchNav = document.getElementById('nav-search');

            if(wrapper.classList.contains('visible')) {
                wrapper.classList.remove('visible');
                searchNav.classList.remove('active');
                homeNav.classList.add('active');
                searchInput.value = "";
                filterSlides(""); 
            } else {
                wrapper.classList.add('visible');
                searchNav.classList.add('active');
                homeNav.classList.remove('active');
                setTimeout(() => searchInput.focus(), 300);
            }
        }

        function resetSearch() {
            const wrapper = document.getElementById('search-wrapper');
            if(wrapper.classList.contains('visible')) {
                toggleSearch();
            }
            goToSlide(0);
        }

        function filterSlides(query) {
            const items = document.querySelectorAll('.playlist-item');
            const lowerQuery = query.toLowerCase();
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(lowerQuery) ? "flex" : "none";
            });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            filterSlides(e.target.value);
        });

        function renderSlide() {
            const slide = slides[currentSlideIndex];
            const container = document.getElementById('slides-container');
            
            document.getElementById('main-view').style.background = slide.gradient;
            container.innerHTML = `<div class="slide active">${slide.content}</div>`;
            
            document.getElementById('footer-title').innerText = slide.title;
            document.getElementById('footer-artist').innerText = slide.artist;
            document.getElementById('footer-img').src = getFooterImage(currentSlideIndex);
            
            if(currentSlideIndex === 0) {
                const heroIcon = document.getElementById('hero-play-icon');
                if(heroIcon) {
                    heroIcon.className = 'fas fa-play'; 
                    heroIcon.style.marginLeft = "4px";
                }
            }

            // Trigger counting animation if on Preprocessing Slide (index 4)
            if(currentSlideIndex === 4) {
                animateCounters();
            }
            
            // Trigger bar chart animation if on EDA Slide (index 5)
            if(currentSlideIndex === 5) {
                animateChart();
            }

            updateProgress();

            const items = document.querySelectorAll('.playlist-item');
            items.forEach((item, idx) => {
                if(idx === currentSlideIndex) {
                    item.classList.add('active');
                    item.querySelector('.playing-icon').style.display = 'block';
                } else {
                    item.classList.remove('active');
                    item.querySelector('.playing-icon').style.display = 'none';
                }
            });

            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([document.getElementById('slides-container')]).catch((err) => console.log(err));
            }
        }

        function getFooterImage(idx) {
            const imgs = [
                "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=100&q=80",
                "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=100&q=80",
                "https://images.unsplash.com/photo-1459749411177-8c2913574757?auto=format&fit=crop&w=100&q=80"
            ];
            return imgs[idx % imgs.length];
        }

        function goToSlide(index) {
            if (index >= 0 && index < slides.length) {
                currentSlideIndex = index;
                renderSlide();
                document.getElementById('main-view').scrollTop = 0;
            }
        }

        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                goToSlide(currentSlideIndex + 1);
            } else {
                goToSlide(0); 
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                goToSlide(currentSlideIndex - 1);
            }
        }

        function togglePlay() {
            const footerIcon = document.getElementById('play-icon');
            const heroIcon = document.getElementById('hero-play-icon');
            const footerBtn = document.querySelector('.play-pause');
            const body = document.body;

            if (isPlaying) {
                footerIcon.className = 'fas fa-play';
                footerBtn.classList.remove('playing');
                body.classList.remove('presentation-mode'); 
                isPlaying = false;
            } else {
                footerIcon.className = 'fas fa-pause';
                footerBtn.classList.add('playing');
                body.classList.add('presentation-mode'); 
                isPlaying = true;
            }
        }

        function updateProgress() {
            const pct = ((currentSlideIndex + 1) / slides.length) * 100;
            document.getElementById('progress-fill').style.width = `${pct}%`;
            document.getElementById('current-time').innerText = slides[currentSlideIndex].duration;
            document.getElementById('total-time').innerText = "0:14";
        }

        function scrub(e) {
            nextSlide();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
            if (e.code === "Space") {
                e.preventDefault();
                togglePlay();
            }
        });

        renderSidebar();
        renderSlide();

    </script>
